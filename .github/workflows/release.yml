name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Step 1: Lint and test
  # ---------------------------------------------------------------------------
  lint:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run lint
        run: make lint

  test:
    name: Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Run tests
        run: bash tests/run_tests.sh

  # ---------------------------------------------------------------------------
  # Step 2: Package and release
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"

          # Find the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n1 || true)

          if [[ -z "$PREV_TAG" ]]; then
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          echo "Release: ${TAG} (range: ${RANGE})"

          COMMITS=$(git log "$RANGE" --pretty=format:"%s" --no-merges 2>/dev/null || true)

          BREAKING_NOTES=""
          FEAT_NOTES=""
          FIX_NOTES=""
          OTHER_NOTES=""

          if [[ -n "$COMMITS" ]]; then
            while IFS= read -r msg; do
              [[ "$msg" =~ ^chore\(release\): ]] && continue
              is_breaking=false
              if [[ "$msg" =~ ^[a-z]+(\(.+\))?!: ]] || [[ "$msg" == *"BREAKING CHANGE"* ]]; then
                BREAKING_NOTES+="- ${msg}"$'\n'
                is_breaking=true
              fi
              if ! $is_breaking; then
                if [[ "$msg" =~ ^feat(\(.+\))?!?:\ (.+) ]]; then
                  FEAT_NOTES+="- ${BASH_REMATCH[2]}"$'\n'
                elif [[ "$msg" =~ ^fix(\(.+\))?!?:\ (.+) ]]; then
                  FIX_NOTES+="- ${BASH_REMATCH[2]}"$'\n'
                elif [[ "$msg" =~ ^[a-z]+(\(.+\))?:\ (.+) ]]; then
                  OTHER_NOTES+="- ${BASH_REMATCH[2]}"$'\n'
                fi
              fi
            done <<< "$COMMITS"
          fi

          NOTES=""
          [[ -n "$BREAKING_NOTES" ]] && NOTES+="## Breaking Changes"$'\n'"${BREAKING_NOTES}"$'\n'
          [[ -n "$FEAT_NOTES" ]]     && NOTES+="## Features"$'\n'"${FEAT_NOTES}"$'\n'
          [[ -n "$FIX_NOTES" ]]      && NOTES+="## Bug Fixes"$'\n'"${FIX_NOTES}"$'\n'
          [[ -n "$OTHER_NOTES" ]]    && NOTES+="## Other Changes"$'\n'"${OTHER_NOTES}"$'\n'

          NOTES+="## Installation"$'\n'$'\n'
          NOTES+="### Quick install"$'\n'$'\n'
          NOTES+='```sh'$'\n'
          NOTES+="curl -fsSL https://raw.githubusercontent.com/emrecanaltinsoy/txs/main/install.sh | bash -s -- --tag ${TAG}"$'\n'
          NOTES+='```'$'\n'$'\n'
          NOTES+="### From tarball"$'\n'$'\n'
          NOTES+='```sh'$'\n'
          NOTES+="tar xzf txs-${TAG#v}.tar.gz"$'\n'
          NOTES+="cd txs-${TAG#v}"$'\n'
          NOTES+="make install"$'\n'
          NOTES+='```'$'\n'

          {
            echo "release_notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tarball
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          ARCHIVE="txs-${VERSION}.tar.gz"

          mkdir -p "txs-${VERSION}"
          cp -r bin lib completions Makefile LICENSE README.md projects.conf.example "txs-${VERSION}/"
          tar czf "$ARCHIVE" "txs-${VERSION}"
          rm -rf "txs-${VERSION}"

          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "Created ${ARCHIVE}"
          ls -lh "$ARCHIVE"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          gh release create "$TAG" \
            --title "txs ${TAG}" \
            --notes "${{ steps.notes.outputs.release_notes }}" \
            "${ARCHIVE}"

          echo "Release ${TAG} created with asset ${ARCHIVE}"
